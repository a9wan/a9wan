<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>仙途入口</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #303030;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .box {
      width: 90%;
      max-width: 420px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
      letter-spacing: 2px;
    }

    .desc {
      font-size: 14px;
      color: #cfcfcf;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #5c6cff;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .tip {
      margin-top: 20px;
      font-size: 12px;
      color: #9a9a9a;
    }
  </style>
</head>

<body>
  <div class="box">

    <div class="title">仙途已启</div>

    <div class="desc">
      道友既得机缘之引<br>
      可循此门，入仙友之境
    </div>

    <a class="btn" href="https://qm.qq.com/q/LDjiKnqf2C">
      进入仙友聚集地
    </a>

    <div class="tip">
      ※ 若无法打开，请更换浏览器尝试
    </div>

  </div>
</body>
</html>

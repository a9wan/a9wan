<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>游戏下载中心</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:#fff;
    text-align:center;
}

.container{
    padding:40px 20px;
}

.card{
    background:#1c1c1c;
    padding:20px;
    border-radius:12px;
    max-width:420px;
    margin:auto;
}

.btn{
    display:block;
    margin:12px 0;
    padding:14px;
    border-radius:8px;
    font-weight:bold;
    text-decoration:none;
    color:#fff;
}

.android{background:#2ecc71;}
.ios{background:#3498db;}

.tip{
    font-size:13px;
    color:#aaa;
    margin-top:10px;
}

/* 弹窗 */
.popup{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}

.box{
    background:#fff;
    color:#000;
    padding:20px;
    border-radius:12px;
    width:280px;
}

.box img{
    width:220px;
    margin-top:10px;
}

.close{
    margin-top:10px;
    color:red;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
    <h1>游戏盒子下载中心</h1>
    <p>系统自动匹配你的设备</p>

    <div class="card">

        <a id="androidBtn" class="btn android" href="http://file.a9wan.com/app/a9wan.apk">
            📱 安卓下载盒子
        </a>

        <a id="iosBtn" class="btn ios" href="https://hetaobao.cn/vip/xlzm">
            🍎 iPhone 点击安装
        </a>

        <div class="tip" id="tipText">
            正在识别设备...
        </div>

    </div>
</div>

<!-- iOS弹窗 -->
<div class="popup" id="popup">
    <div class="box">
        <h3>iPhone安装入口</h3>
        <p>请扫码安装</p>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://hetaobao.cn/vip/xlzm"/>

        <div class="close" onclick="closePopup()">关闭</div>
    </div>
</div>

<script>
function detect(){

    const ua = navigator.userAgent.toLowerCase();

    const isAndroid = ua.includes("android");
    const isIOS = /iphone|ipad|ipod/.test(ua);

    const tip = document.getElementById("tipText");
    const androidBtn = document.getElementById("androidBtn");

    if(isAndroid){
        tip.innerText = "已检测安卓设备，点击即可下载";
    }

    if(isIOS){
        androidBtn.style.display="none";
        tip.innerText = "已检测iPhone设备";

        // 只弹一次（避免骚扰）
        setTimeout(()=>{
            document.getElementById("popup").style.display="flex";
        },800);
    }

    if(!isAndroid && !isIOS){
        tip.innerText="电脑用户可选择下载或扫码安装";
    }
}

function closePopup(){
    document.getElementById("popup").style.display="none";
}

detect();
</script>

</body>
</html>
